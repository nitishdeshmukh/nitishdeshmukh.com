name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      # Build MUST run before typecheck to generate .next/types
      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8787

      - name: Typecheck
        run: bun run typecheck
